  <title id="fig-title-09-04">The expectation value is the centroid of the probability density</title>
  <desc>A probability density curve, the absolute square of the wave function, is drawn over position x and filled pale blue. Thin vertical bars sample the density to suggest the weighted sum. A dashed vertical line with a downward triangle marks the mean position, the expectation value of x, which is the balance point of the distribution. The mean sits between the tall peak and the long right tail, away from the panel center, showing the centroid is a property of the distribution.</desc>
