<title id="ttl-0605">The scanning tunneling microscope as an exponential ruler</title>
<desc>A sharp metal tip hovers a gap d above a metal surface. The wave function decays exponentially across the gap, so the tunnelling current depends exponentially on d: one extra ångström changes the current by a factor of about 7 to 10, which is what makes atomic-resolution imaging possible.</desc>
