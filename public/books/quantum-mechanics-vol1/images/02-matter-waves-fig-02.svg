<svg viewBox="0 0 700 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02m">
  <title id="fig-title-02m">The Davisson–Germer experiment: a 50° intensity peak explained by Bragg reflection</title>
  <desc>Top: an electron gun fires a 54 V beam at a nickel single crystal and a detector on a rotatable arm finds a sharp intensity peak near a 50 degree scattering angle. Bottom, magnified to the atomic scale: two parallel electron waves reflect from successive crystal planes separated by d; the lower wave travels an extra path 2 d sin theta, so the reflections reinforce, and a diffraction peak appears, when that extra path equals a whole number of wavelengths.</desc>
