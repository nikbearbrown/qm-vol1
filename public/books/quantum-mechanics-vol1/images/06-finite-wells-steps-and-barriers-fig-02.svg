<svg viewBox="0 0 700 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl-0602">
<title id="ttl-0602">Penetration depth grows as the binding weakens</title>
<desc>Two finite-well bound states. The tightly bound ground state (top) has large |E| and short evanescent tails that hug the well. The loosely bound top state (bottom) has E near zero and long tails that leak far past the classical turning points (the well edges, dashed). The well region is shaded.</desc>
