  <text x="171" y="150" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="15" fill="#2a1a0e" text-anchor="middle">state:  &#968;(x)</text>

  <text x="171" y="208" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="15" fill="#2a1a0e" text-anchor="middle">x&#770; &#160;=&#160; x &#183;</text>
  <text x="171" y="252" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="15" fill="#2a1a0e" text-anchor="middle">p&#770; &#160;=&#160; &#8722;i&#8463; &#8706;<tspan dy="4" font-size="11">x</tspan></text>
  <text x="171" y="294" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" fill="#545454" text-anchor="middle">momentum = differentiate</text>

