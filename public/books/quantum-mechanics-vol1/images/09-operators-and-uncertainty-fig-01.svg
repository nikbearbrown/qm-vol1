  <title id="fig-title-09-01">Fourier duality: position space and momentum space are two representations of the same state</title>
  <desc>Two panels side by side. The left panel, position space, holds the state psi(x) with the position operator acting as multiplication by x and the momentum operator as minus i h-bar times the x-derivative. The right panel, momentum space, holds phi(p) with momentum acting as multiplication by p and position as plus i h-bar times the p-derivative. A green arrow labeled Fourier transform runs from position to momentum space; a purple arrow labeled inverse Fourier transform runs back. A note states both panels describe the same physical state.</desc>
