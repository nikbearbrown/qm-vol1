  <title id="fig-title-09-02">A classical state is a single phase-space point; no quantum state has both position and momentum definite</title>
  <desc>Left panel: a classical phase space with position on the horizontal axis and momentum on the vertical axis, containing one filled point that fixes both x and p at once. Right panel: two quantum probability densities. A near-position eigenstate is a sharp spike, definite in x but completely spread in momentum; a plane wave (momentum eigenstate) is a flat oscillation, definite in p but completely spread in x. No single state can be both. The banner states the commutator of x-hat and p-hat equals i h-bar, which is nonzero.</desc>
