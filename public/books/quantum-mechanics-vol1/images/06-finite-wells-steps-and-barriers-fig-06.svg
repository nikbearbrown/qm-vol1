<title id="ttl-0606">Energy diagram for the rectangular barrier</title>
<desc>The total energy E (dashed) is a flat horizontal line that does not change anywhere — in region I before the barrier, inside the barrier (region II), or in region III beyond it. The barrier V0 rises above E. The wave function is oscillatory in I, decays in the barrier, and oscillates with reduced amplitude in III.</desc>
