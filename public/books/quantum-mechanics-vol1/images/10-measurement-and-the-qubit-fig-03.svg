  <title id="fig-title-10-03">Bloch sphere representation of a qubit state with polar angle theta and azimuthal angle phi</title>
  <desc>Unit sphere in orthographic projection. The vertical z-axis carries the north pole |0&#10217; (green, sigma-z = +1) at the top and the south pole |1&#10217; (red, sigma-z = -1) at the bottom. Four equatorial eigenstates are marked as amber diamonds. A blue state vector points at polar angle theta from the north pole and azimuthal angle phi around the equator, with dashed arcs marking both angles.</desc>
