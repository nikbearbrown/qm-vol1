<head>

<title>Research Mentoring Course — CaNCURE</title>
<style>
  :root{--neu-red:#c8102e;--ink:#1f2329;--muted:#5b6470;--line:#e3e6ea;--bg:#f6f7f9;--card:#fff;--good:#1d7a46;--bad:#b3261e;--soft:#fbe9ec;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6}
  .wrap{max-width:820px;margin:0 auto;padding:0 18px 60px}
  header.top{background:var(--neu-red);color:#fff;padding:18px 0}
  header.top .wrap{display:flex;align-items:center;justify-content:space-between;gap:12px}
  header.top .crumb{font-size:13px;opacity:.85;letter-spacing:.02em}
  header.top h1{font-size:19px;margin:2px 0 0;font-weight:600}
  .pill{background:rgba(255,255,255,.18);border-radius:999px;padding:5px 12px;font-size:12px;white-space:nowrap}
  .progress{height:6px;background:#e9ebee;border-radius:999px;margin:18px 0 4px;overflow:hidden}
  .progress > span{display:block;height:100%;background:var(--neu-red);width:0;transition:width .3s}
  .stepmeta{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:600}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px 28px;margin-top:10px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
  .card h2{font-size:23px;margin:0 0 10px;line-height:1.25}
  .card p{margin:0 0 14px}
  .card p a, .card a.inline{color:var(--neu-red);font-weight:600}
  .eyebrow{color:var(--neu-red);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
  .muted{color:var(--muted);font-size:14px}
  .objbox{background:var(--soft);border:1px solid #f1cdd4;border-radius:12px;padding:16px 20px;margin:6px 0 4px}
  .objbox b{display:block;margin-bottom:6px}
  .objbox ul{margin:0;padding-left:20px}.objbox li{margin:5px 0}
  figure{margin:16px 0 4px;text-align:center}

  figcaption{font-size:13px;color:var(--muted);margin-top:8px;text-align:left}

  .comp .ico{font-size:20px}.comp .nm{font-weight:700;margin:4px 0 2px}.comp .ds{font-size:13.5px;color:var(--muted)}
  .videocard{position:relative;display:block;width:100%;padding-top:56.25%;border-radius:12px;overflow:hidden;border:1px solid var(--line);margin:6px 0 0;background:#000;text-decoration:none}
  .videocard img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:.9;transition:.2s}
  .videocard:hover img{opacity:1}
  .videocard .playbtn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:62px;height:62px;border-radius:50%;background:rgba(200,16,46,.92);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;padding-left:4px;box-shadow:0 2px 10px rgba(0,0,0,.4)}
  .videocard .vlabel{position:absolute;left:0;right:0;bottom:0;padding:8px 12px;font-size:13px;font-weight:600;color:#fff;background:linear-gradient(transparent,rgba(0,0,0,.75))}

  .ytframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
  .reflect{border-left:4px solid var(--neu-red);background:#fff;padding:6px 18px 12px;margin-top:14px}

  ul.res li{padding:11px 0;border-bottom:1px solid var(--line)}ul.res li:last-child{border-bottom:0}
  ul.res a{color:var(--neu-red);font-weight:600;text-decoration:none}ul.res a:hover{text-decoration:underline}

  .badge{display:inline-block;background:var(--neu-red);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:.05em;margin-left:8px;vertical-align:middle}
  .q{border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin:14px 0}
  .q .qno{font-size:12px;color:var(--neu-red);font-weight:700;letter-spacing:.05em}
  .q p.stem{font-weight:600;margin:6px 0 12px}
  .opt{display:block;border:1px solid var(--line);border-radius:9px;padding:11px 14px;margin:7px 0;cursor:pointer;transition:.15s}
  .opt:hover{border-color:#bcc3cc}.opt input{margin-right:10px}
  .opt.correct{border-color:var(--good);background:#eaf6ef}
  .opt.wrong{border-color:var(--bad);background:#fdecea}
  .fb{font-size:13.5px;margin-top:8px;display:none}.fb.show{display:block}.fb.ok{color:var(--good)}.fb.no{color:var(--bad)}
  .scorebox{text-align:center;padding:22px;border-radius:12px;margin-top:10px;display:none}
  .scorebox.pass{background:#eaf6ef;border:1px solid #b6dcc4}.scorebox.fail{background:#fff6f7;border:1px solid #f3ccd3}.scorebox h3{margin:0 0 6px}
  .likert{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .likert label{display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;border:1px solid var(--line);border-radius:11px;padding:14px 8px;cursor:pointer;font-size:13px;transition:.15s;background:#fbfcfd}
  .likert label:hover{border-color:#bcc3cc}.likert input{margin:0;width:18px;height:18px;accent-color:var(--neu-red)}
  .likert label.sel{border-color:var(--neu-red);background:#fff6f7}
  .qlabel{font-weight:700;font-size:16px;margin:18px 0 12px}.qlabel .n{color:var(--neu-red);margin-right:6px}
  textarea.cmt{width:100%;min-height:80px;border:1px solid var(--line);border-radius:10px;padding:12px;font:inherit;resize:vertical}
  .thanks{display:none;text-align:center;background:#eaf6ef;border:1px solid #b6dcc4;border-radius:12px;padding:24px;margin-top:6px}
  .nav{display:flex;justify-content:space-between;align-items:center;margin-top:22px;gap:10px}
  .credit{font-size:12px;color:var(--muted);text-align:center;margin-top:20px;padding-top:14px;border-top:1px solid var(--line)}
  button{font:inherit;cursor:pointer;border-radius:9px;border:1px solid var(--line);background:#fff;padding:11px 20px;font-weight:600}
  button.primary{background:var(--neu-red);color:#fff;border-color:var(--neu-red)}
  button:disabled{opacity:.45;cursor:not-allowed}
  @media(max-width:560px){.agree,.agree.two,.compgrid{grid-template-columns:1fr}.likert{grid-template-columns:1fr}.likert label{flex-direction:row;justify-content:flex-start;gap:12px}}

<script>
const COURSE=[
{title:"Module 1 \u2014 Introduction to Research Mentoring", pages:["<div class=\"eyebrow\">Welcome</div>\n<h2>Mentoring Is a Skill You Can Learn</h2>\n<p>You have spent years learning how to do research. Mentoring is a different skill \u2014 and, like any research skill, it can be learned, practiced, and improved. You do not need prior experience to mentor well. This course gives you practical tools you can start using on your mentee's very first day.</p>\n<p>This course is for junior researchers and faculty mentoring an undergraduate (BS) researcher in Northeastern's <b>CaNCURE</b> program \u2014 a paid co-op placing students in cancer-nanomedicine labs. You already bring the science. This course adds the mentoring layer on top of it.</p>\n<p>It is meant to be short and practical: about an hour, in a single session, with a few questions along the way. Good mentoring is one of the most rewarding parts of a research career, and your mentee's experience will be shaped in large part by you. The goal of everything here is a positive outcome for <i>both</i> of you.</p>\n<div class=\"objbox\"><b>By the end of this section you will be able to:</b>\n  <ul>\n    <li>Define research mentoring and distinguish it from supervising and teaching.</li>\n    <li>Describe the aims of a mentoring relationship for the mentee, the mentor, and the program.</li>\n    <li>Identify the core competencies of effective research mentoring.</li>\n    <li>Recognize a common early challenge and a practical way to meet it.</li>\n  </ul>\n</div>", "<div class=\"eyebrow\">Definition</div>\n<h2>What Is Research Mentoring?</h2>\n<p>Research mentoring is a supportive, developmental relationship in which a more experienced researcher helps a less experienced one grow \u2014 in skills, in confidence, and in their sense of themselves as a scientist. It is a <b>two-way relationship</b>: done well, both people learn and both benefit.</p>\n<p>It helps to see how mentoring differs from two things it is often confused with:</p>\n<p><b>Supervising</b> assigns tasks and checks that they get done. <b>Teaching</b> delivers set content to a group. <b>Mentoring</b> is individual and developmental \u2014 it meets one person where they are and helps them grow over time. A good mentor does some supervising and some teaching, but the relationship is more than either.</p>\n<p>Over a six-month co-op you will move among several roles: <b>trainer</b> (showing techniques), <b>advisor</b> (helping make decisions), <b>role model</b> (showing how a scientist thinks and works), and <b>advocate</b> (opening doors, making introductions, writing the recommendation). Which role matters most shifts as your mentee grows. And as a junior researcher you are often a <b>near-peer mentor</b> \u2014 close enough to remember being new yourself, which is one of your greatest advantages.</p>\n<div class=\"videocard ytfacade\" data-id=\"G2jkmJPJU6A\" role=\"button\" tabindex=\"0\">\n  <img src=\"https://i.ytimg.com/vi/G2jkmJPJU6A/hqdefault.jpg\" alt=\"Video thumbnail: What Is the Role of Mentorship in Student Research?\">\n  <span class=\"playbtn\">&#9654;</span>\n  <span class=\"vlabel\">Play video</span>\n</div>\n<p style=\"font-size:13.5px;color:var(--muted);margin-top:8px\"><b>Watch:</b> \"What Is the Role of Mentorship in Student Research?\" \u2014 Yale School of Medicine. <a class=\"inline\" href=\"https://www.youtube.com/watch?v=G2jkmJPJU6A\" target=\"_blank\" rel=\"noopener\">Open on YouTube</a> if it does not play inline.</p>", "<div class=\"eyebrow\">Aims &amp; goals</div>\n<h2>What Mentoring Is For</h2>\n<p>Mentoring works best when you are clear about what it is for. A strong research mentoring relationship serves three sets of goals at once \u2014 and they reinforce one another.</p>\n<p><b>For your mentee.</b> Real technical and scientific skills; the beginnings of scientific reasoning and judgment; growing confidence and a research identity \u2014 seeing herself as someone who belongs in science; and a clearer sense of her next step, whether that is graduate school, medical school, or industry.</p>\n<p><b>For you, the mentor.</b> Mentoring sharpens skills that matter for the rest of your career \u2014 communicating clearly, giving feedback, leading a project, and working with people. A well-mentored student also becomes a genuine contributor to your research. And helping train the next scientist is one of the more meaningful parts of the work.</p>\n<p><b>For science and for CaNCURE.</b> The program exists to build the cancer-nanomedicine research workforce and to broaden who takes part in it. A well-mentored undergraduate research experience is among the strongest predictors that a student will continue in cancer research \u2014 the main aim of the CaNCURE program \u2014 and that effect is largest for students from backgrounds underrepresented in research.</p>\n<div class=\"takeaway\">When the relationship is working, all three move together: your mentee grows, your project moves forward, and you become a stronger scientist and leader.</div>", "<div class=\"eyebrow\">Your roadmap</div>\n<h2>The Core Mentoring Competencies</h2>\n<p>Here is the encouraging part: effective mentoring is not a mystery or a fixed personality trait. Researchers have studied what good mentors actually do, and it comes down to a set of <b>learnable competencies</b>. This course is built around them, so you will develop each one as you go.</p>\n<div class=\"compgrid\">\n  <div class=\"comp\"><div class=\"ico\">&#129309;</div><div class=\"nm\">Aligning expectations</div><div class=\"ds\">Agree early on goals, roles, and how you will work together.</div></div>\n  <div class=\"comp\"><div class=\"ico\">&#128172;</div><div class=\"nm\">Effective communication</div><div class=\"ds\">Clear, regular, two-way conversation that fits both of you.</div></div>\n  <div class=\"comp\"><div class=\"ico\">&#129517;</div><div class=\"nm\">Assessing understanding</div><div class=\"ds\">Check what your mentee actually knows, and teach to that.</div></div>\n  <div class=\"comp\"><div class=\"ico\">&#127793;</div><div class=\"nm\">Fostering independence</div><div class=\"ds\">Help her move from following steps to making her own calls.</div></div>\n  <div class=\"comp\"><div class=\"ico\">&#127891;</div><div class=\"nm\">Professional development</div><div class=\"ds\">Support her growth and her next career step.</div></div>\n  <div class=\"comp\"><div class=\"ico\">&#129526;</div><div class=\"nm\">Equity &amp; inclusion</div><div class=\"ds\">Make sure she feels she belongs and can fully take part.</div></div>\n</div>\n<p style=\"margin-top:16px\">The seventh competency is the most personal: <b>articulating your own mentoring philosophy</b> \u2014 knowing, and being able to state, the kind of mentor you want to be. You do not need a polished statement today. Think for a moment about the mentors who shaped you: what did the good ones do? Even a line or two is a real start, and you will refine it as the course goes on.</p>\n<div class=\"reflect\">\n  <div class=\"eyebrow\" style=\"margin-top:10px\">A first reflection</div>\n  <p style=\"margin:4px 0 0;font-size:14.5px\">In one or two sentences: what kind of mentor do you want to be?</p>\n  <textarea placeholder=\"e.g., I want my mentee to feel safe asking any question \u2014 and to leave able to run an experiment on her own.\"></textarea>\n</div>", "<div class=\"eyebrow\">One challenge, met well</div>\n<h2>The Uncertain First Week</h2>\n<p>Every section of this course pairs its ideas with one real challenge you are likely to meet \u2014 and a practical way to meet it. For your first week, the most common one is this.</p>\n<div class=\"challenge\">\n  <b>The situation.</b> Your new mentee arrives capable and motivated \u2014 but nervous. She is not sure what is expected of her, what a good first week even looks like, or whether it is okay to ask questions. So she stays quiet, nods through a demonstration she does not fully follow, and waits to be told what to do. None of this means she is not able. It usually just means no one has told her yet what success looks like.\n</div>\n<p>This matters because a quiet, uncertain start can harden into a habit \u2014 a mentee who waits for instructions instead of engaging. The good news is that the first week is also your best opportunity, and the fixes are simple and low-cost.</p>\n<ol class=\"steps3\">\n  <li><b>Say out loud what a good first week and first month look like.</b> \"By Friday I'd like you comfortable with X. This first month is about learning Y well \u2014 you're not expected to produce results yet.\" Removing the guesswork is a genuine gift.</li>\n  <li><b>Make it explicit that questions are welcome.</b> \"There is no such thing as a question that's too basic here \u2014 asking is exactly what I want you to do.\" Then show you mean it the first time she asks.</li>\n  <li><b>Check in early and warmly.</b> A short, friendly conversation on day one and at the end of the first week does more than any document.</li>\n</ol>\n<div class=\"takeaway\">You do not need to be perfect or have every answer. A warm, clear start \u2014 saying the unspoken things out loud \u2014 sets your mentee, and you, up for a good six months. That habit of making the implicit explicit is one you will use throughout this course.</div>"], quiz:[{"stem": "What best distinguishes mentoring from supervising?", "opts": ["Mentoring is mainly about assigning tasks and checking they get done.", "Mentoring is an individual, developmental relationship focused on a person's growth over time, whereas supervising focuses on getting tasks done.", "Mentoring only takes place in a classroom setting.", "There is no real difference between them."], "correct": 1, "fb": "Mentoring is developmental and individual \u2014 it helps a person grow over time, which is more than getting tasks done."}, {"stem": "Which statement best captures the aims of a research mentoring relationship?", "opts": ["It mainly benefits the mentee, while the mentor gives up time for little in return.", "It benefits both: the mentee grows in skills and confidence, the mentor builds communication and leadership skills, and the program helps build the cancer-research workforce.", "Its only purpose is to generate data for the mentor's project.", "Its only purpose is to get the mentee into graduate school."], "correct": 1, "fb": "Mentoring is a two-way relationship that serves the mentee, the mentor, and the program's mission together."}, {"stem": "Which of the following is one of the core, learnable competencies of effective research mentoring?", "opts": ["Having a naturally outgoing personality.", "Aligning expectations with your mentee.", "Avoiding any discussion of career plans.", "Specializing specifically in cancer nanomedicine."], "correct": 1, "fb": "Aligning expectations is a core competency. Good mentoring is a set of learnable skills, not a fixed personality trait."}, {"stem": "Your new mentee is capable but quiet in her first week: she nods through demonstrations and rarely asks questions. What is the most likely explanation and best first response?", "opts": ["She isn't suited to research \u2014 consider reassigning her.", "She's probably unsure what's expected and whether questions are welcome; say out loud what a good first week looks like and make clear that questions are encouraged.", "She's disengaged; wait to see if she improves on her own.", "She needs harder tasks right away to prove herself."], "correct": 1, "fb": "A quiet start usually means expectations haven't been made explicit yet. Naming what success looks like and welcoming questions sets a positive tone."}, {"stem": "A mentee hesitates to ask questions. Which action best reflects good early mentoring?", "opts": ["Tell her to figure things out alone to build resilience.", "State explicitly that no question is too basic, and respond warmly the first time she asks.", "Only take questions by email, to keep a record.", "Correct her in front of the lab so everyone learns."], "correct": 1, "fb": "Making it explicit that questions are welcome \u2014 and showing it the first time \u2014 builds the safety a new mentee needs to engage."}]},
{title:"Module 2 \u2014 Aligning Expectations", pages:["<div class=\"eyebrow\">Why it matters</div>\n    <h2>Starting on the Same Page</h2>\n    <p>One of the most effective things you can do for a new mentee is to make expectations clear from the start. Most early friction in a mentoring relationship does not come from a difficult student or a difficult mentor \u2014 it comes from two reasonable people quietly assuming different things. The remedy is simple: talk it through and write it down, <i>together</i>, before the work begins.</p>\n    <!-- In Canvas, this AAMC link can be repointed to an uploaded copy of the Compact document. -->\n    <p>This shared understanding is sometimes called a <b>mentorship compact</b> (or mentoring agreement). It is not a contract and not paperwork \u2014 it is a short, friendly conversation that you capture in writing and can revisit any time. A well-known version is the <a href=\"https://www.aamc.org/what-we-do/mission-areas/medical-research/grad-compact\" target=\"_blank\" rel=\"noopener\">AAMC Compact between trainees and advisors</a>, which describes it as a living document meant to start a conversation, not bind anyone.</p>\n    <div class=\"objbox\"><b>By the end of this module you will be able to:</b>\n      <ul>\n        <li>Explain why aligning expectations early prevents problems later.</li>\n        <li>Identify the three areas worth agreeing on: goals and timeline, communication, and documentation.</li>\n        <li>Co-create a simple mentorship compact with your mentee.</li>\n        <li>Recognize and resolve a common expectation mismatch.</li>\n      </ul>\n    </div>", "<div class=\"eyebrow\">Goals &amp; timeline</div>\n    <h2>Agree on Goals and a Realistic Timeline</h2>\n    <p>Start by agreeing on what a successful co-op looks like. For a roughly six-month research experience, that usually means learning one or two techniques well, generating some solid data, and finishing with something to show for it \u2014 a figure, a short presentation, a clear record others can build on.</p>\n    <p>A useful rough rhythm is to spend the early part on <b>training</b>, the middle stretch on <b>generating data</b>, and the final stretch on <b>pulling the work together</b>. The training time at the start and the wrap-up time at the end are the two pieces most often squeezed when a project runs long \u2014 and both matter, so protect them on purpose.</p>\n    <p>Setting these goals <i>with</i> your mentee, rather than handing them down, helps her feel ownership of the work from day one \u2014 and gives you a shared reference point if priorities need to shift later.</p>\n    <figure><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAC2UAAAbWCAYAAACI0/5qAAAACXBIWXMAAC4jAAAuIwF4pT92AAAgAElEQVR4nOzdh5cc1Zk/7u9f8PPa3rXXAWxjG2ODyNFEkWwyNjnnDCILRJDIiCBytjDCBmEQGUSwABNMDiKIDBKgQFIChARIcH/nbZ9hO1Rruru6Z3paz3NOnfWiqVu3qm7dqpn+1Nv/L6X0cgIAAAAAAAAAAAAAoBEv/z+hbAAAAAAAAAAAAACAhgllAwAAAAAAAAAAAADkIJQNAAAAAAAAAAAAAJCDUDYAAAAAAAAAAAAAQA5C2QAAAAAAAAAAAAAAOQhlAwAAAAAAAAAAAADkIJQNAAAAAAAAAAAAAJCDUDYAAAAAAAAAAAAAQA5C2QAAAAAAAAAAAAAAOQhlAwAAAAAAAAAAAADkIJQNAAAAAAAAAAAAAJCDUDYAAAAAAAAAAAAAQA5C2QAAAAAAAAAAAAAAOQhlAwAAAAAAAAAAAADkIJQNAAAAAAAAAAAAAJCDUDYAAAAAAAAAAAAAQA5C2QAAAAAAAAAAAAAAOQhlAwAAAAAAAAAAAADkIJQNAAAAAAAAAAAAAJCDUDYAAAAAAAAAAAAAQA5C2QAAAAAAAAAAAAAAOQhlAwAAAAAAAAAAAADkIJQNAAAAAAAAAAAAAJCDUDYAAAAAAAAAAAAAQA5C2QAAAAAAAAAAAAAAOQhlAwAAAAAAAAAAAADkIJQNAAAAAAAAAAAAAJCDUDYAAAAAAAAAAAAAQA5C2QAAAAAAAAAAAAAAOQhlAwAAAAAAAAAAAADkIJQNAAAAAAAAAAAAAJCDUDYAAAAAAAAAAAAAQA5C2QAAAAAAAAAAAAAAOQhlAwAAAAAAAAAAAADkIJQNAAAAAAAAAAAAAJCDUDYAAAAAAAAAAAAAQA5C2QAAAAAAAAAAAAAAOQhlAwAAAAAAAAAAAADkIJQNAAAAAAAAAAAAAJCDUDYAAAAAAAAAAAAAQA5C2QAAAAAAAAAAAAAAOQhlAwAAAAAAAAAAAADkIJQNAAAAAAAAAAAAAJCDUDYAAAAAAAAAAAAAQA5C2QAAAAAAAAAAAAAAOQhlAwAAAAAAAAAAAADkIJQNAAAAAAAAAAAAAJCDUDYAAAAAAAAAAAAAQA5C2QAAAAAAAAAAAAAAOQhlAwAAAAAAAAAAAADkIJQNAAAAAAAAAAAAAJCDUDYAAAAAAAAAAAAAQA5C2QAAAAAAAAAAAAAAOQhlAwAAAAAAAAAAAADkIJQNAAAAAAAAAAAAAJCDUDYAAAAAAAAAAA AAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAMyRd4AAAG4SURBVAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAAAIpGwAAAAAAAAAAAAAgEDKBgAAAAAAAAAAAADYvzmryjQ/IU5vPQAAAABJRU5ErkJggg==\" alt=\"A six-month co-op timeline: training, then data generation, then pulling the work together\">\n      <figcaption><b>Figure 2.1</b> \u2014 A rough rhythm for a six-month co-op: protect the training time at the start and the wrap-up time at the end; both get squeezed when a project runs long.</figcaption>\n    </figure>", "<div class=\"eyebrow\">Communication &amp; records</div>\n    <h2>How You'll Communicate \u2014 and What to Write Down</h2>\n    <p><b>Communication.</b> Decide together how you will stay in touch and how often. A few simple agreements go a long way. New mentees rarely know what is normal in a lab, so silence can feel like neglect \u2014 or like they are bothering you. A little clarity up front removes a lot of that worry.</p>\n    <div class=\"agree\">\n      <div class=\"a\"><div class=\"ico\">&#128197;</div><div class=\"h\">How often we'll meet</div><div class=\"t\">A regular check-in \u2014 for example, a 30-minute meeting once a week.</div></div>\n      <div class=\"a\"><div class=\"ico\">&#9993;&#65039;</div><div class=\"h\">How to reach me</div><div class=\"t\">Which questions to email, which to just ask in person \u2014 and roughly how soon she can expect a reply (say, within a day).</div></div>\n      <div class=\"a\"><div class=\"ico\">&#128101;</div><div class=\"h\">If I'm not available</div><div class=\"t\">One other person she can turn to, so an urgent problem never has to wait.</div></div>\n    </div>\n    <p style=\"margin-top:14px\"><b>Documentation.</b> Agree early on what good record-keeping looks like in your lab: what a complete notebook entry contains, where data files go, and how samples are labeled. The single most useful habit is recording things <i>as they happen</i>, rather than reconstructing them days later. Good records protect your mentee's work and let the next person pick it up.</p>", "<div class=\"eyebrow\">One challenge, met well</div>\n    <h2>The Quiet Expectation Mismatch</h2>\n    <div class=\"challenge\">\n      <b>The situation.</b> A few weeks in, your mentee feels you \"never meet with her,\" while you feel she \"keeps interrupting.\" Both of you are right \u2014 and neither is at fault. You pictured informal check-ins whenever your paths crossed; she pictured a scheduled weekly meeting. Nobody wrote it down, so the gap stayed invisible until it turned into frustration.\n    </div>\n    <p>This is the most common expectation problem, and it happens because reasonable people fill in unstated expectations differently. The good news is that it is easy to resolve \u2014 and even easier to prevent.</p>\n    <ol class=\"steps3\">\n      <li><b>Name it without blame.</b> \"Let's get our check-ins sorted so neither of us is guessing.\" Frame it as a shared fix, not a fault.</li>\n      <li><b>Make it concrete, in writing.</b> \"We'll meet Tuesdays 2:00&ndash;2:30, and you bring three things to discuss.\" One specific line settles it.</li>\n      <li><b>Revisit when needed.</b> The compact is a living agreement \u2014 adjust it together as the co-op's needs change.</li>\n    </ol>\n    <div class=\"takeaway\">Almost every expectation problem dissolves the same way: say the unspoken thing out loud, together, and write it down. That single habit will serve you for the rest of the co-op.</div>"], quiz:[

{title:"Module 3 \u2014 Communication and Teaching at the Bench", pages:["<div class=\"eyebrow\">Why it matters</div>\n    <h2>Communicating and Teaching at the Bench</h2>\n    <p>A big part of mentoring is helping your mentee learn to do the work \u2014 and that rests on two everyday skills: communicating clearly, and teaching technique in a way that sticks. Both are learnable, and a few simple habits make a real difference.</p>\n    <p>Good communication is two-way: you explain clearly, and you make room for her to ask questions and tell you what she is thinking. And good teaching is more than a one-time demonstration \u2014 it is showing, supporting, and gradually stepping back as she grows more capable.</p>\n    <div class=\"objbox\"><b>By the end of this module you will be able to:</b>\n      <ul>\n        <li>Communicate in a way that invites questions and keeps you both informed.</li>\n        <li>Check what your mentee actually understands, rather than assuming.</li>\n        <li>Teach a technique using a show &rarr; support &rarr; step-back approach.</li>\n        <li>Respond helpfully when a procedure keeps going wrong.</li>\n      </ul>\n    </div>", "<div class=\"eyebrow\">Communicate &amp; check</div>\n    <h2>Communicate Clearly, and Check Understanding</h2>\n    <p><b>Explain the \"why,\" not just the \"what.\"</b> When you show your mentee something, share the reasoning behind it \u2014 why a step matters, where people often slip up. The reasoning is often the most useful thing you can give her, because it lets her handle situations the instructions do not spell out. Keep communication regular and two-way, and treat her questions as a good sign, not an interruption.</p>\n    <p><b>Then check what she actually understood.</b> A nod is not the same as understanding. The most reliable \u2014 and kindest \u2014 way to check is to have her show you or explain it back in her own words. It tells you exactly what to teach next, and it catches small gaps now instead of weeks later.</p>\n    <div class=\"agree two\">\n      <div class=\"a\"><div class=\"ico\">&#128172;</div><div class=\"h\">Ask her to explain it back</div><div class=\"t\">\"Can you walk me through why we do this step?\" \u2014 in her own words.</div></div>\n      <div class=\"a\"><div class=\"ico\">&#128064;</div><div class=\"h\">Watch her do it once</div><div class=\"t\">A short observation tells you more than any \"Did that make sense?\"</div></div>\n    </div>", "<div class=\"eyebrow\">How to teach a technique</div>\n    <h2>Show, Support, Step Back</h2>\n    <p>The reliable way to teach a technique has three stages \u2014 sometimes called <i>\"I do, we do, you do.\"</i> The work gradually shifts from you to her, and that shift is exactly the sign she is growing.</p>\n    <div class=\"agree\">\n      <div class=\"a stage\"><div class=\"num\">1 \u00b7 SHOW</div><div class=\"h\">You do it, out loud</div><div class=\"t\">Perform it while talking through your reasoning. A silent demo teaches the motions but not the judgment.</div></div>\n      <div class=\"a stage\"><div class=\"num\">2 \u00b7 SUPPORT</div><div class=\"h\">She does it, you help</div><div class=\"t\">She practices while you are there. Let small, recoverable mistakes happen \u2014 they teach \u2014 and step in only when an error would be costly or unsafe.</div></div>\n      <div class=\"a stage\"><div class=\"num\">3 \u00b7 STEP BACK</div><div class=\"h\">She does it, then checks in</div><div class=\"t\">Once she is reliable, she runs it on her own and brings you the result to review. Independence is earned step by step.</div></div>\n    </div>\n    <p style=\"margin-top:14px\">You do not jump from \"watch me once\" straight to \"now do it alone.\" The middle stage \u2014 practicing with you nearby \u2014 is where most real learning happens, and skipping it is the most common reason technique slips later.</p>", "<div class=\"eyebrow\">One challenge, met well</div>\n    <h2>A Procedure That Keeps Failing</h2>\n    <div class=\"challenge\">\n      <b>The situation.</b> Your mentee runs the same procedure several times and it keeps not working \u2014 even though her notebook shows she followed every written step. It is tempting to wonder whether she \"just can't do it.\" Almost always, that is not what is going on.\n    </div>\n    <p>The best first move is simple: <b>watch her do the whole thing once.</b> Repeated trouble on a correctly written procedure usually points to one small detail that the notebook can't reveal. Here is how to work through it:</p>\n    <ol class=\"steps3\">\n      <li><b>Watch, don't take over.</b> Observe the full run from start to finish, so you can see what the written record cannot show.</li>\n      <li><b>Find the gap &mdash; is it the instructions, or the technique?</b> There are two possibilities, and they have opposite fixes. Sometimes the <i>written protocol</i> itself left something out or states a step imprecisely \u2014 then the fix is to update the instructions so they are complete. Other times the instructions are correct but <i>one step is being carried out slightly wrong</i> \u2014 a pipette tip brushing the tube wall, two reagents added in the wrong order, a timing that drifts a little each run \u2014 and then the fix is to re-show that single technique, not to change the protocol. Watching her work is what tells the two apart, and neither one is a verdict on her ability.</li>\n      <li><b>Re-show the specific step, warmly.</b> Treat it as a normal part of learning, because it is.</li>\n    </ol>\n    <div class=\"takeaway\">Repeated trouble is usually a sign that one small thing hasn't been shown yet \u2014 not that your mentee isn't capable. Finding it together is one of the most encouraging moments you can create.</div>"], quiz:[
 {stem:"Your mentee nods when you finish explaining a procedure. What is the most reliable way to know whether she actually understood?",

{title:"Module 4 \u2014 Building Research Identity and Belonging", pages:["<div class=\"eyebrow\">Why it matters</div>\n    <h2>From \"Lab Hand\" to Researcher</h2>\n    <p>A mentee can follow every protocol correctly and still not yet see herself as a scientist \u2014 or feel that she truly belongs in the group. Helping her get there is one of the most rewarding parts of mentoring, and it happens in small, everyday moments: making it safe to speak up, inviting her thinking, and making sure she feels part of the team.</p>\n    <p>This module is about those moments. None of them take much time, and together they are often what decides whether a talented student stays in research.</p>\n    <div class=\"objbox\"><b>By the end of this module you will be able to:</b>\n      <ul>\n        <li>Create psychological safety so your mentee can ask, admit mistakes, and share ideas.</li>\n        <li>Build her research identity by inviting her thinking and recognizing her contributions.</li>\n        <li>Tell the difference between giving someone access and helping her truly belong.</li>\n        <li>Notice when a mentee isn't participating, and respond in a way that brings her in.</li>\n      </ul>\n    </div>", "<div class=\"eyebrow\">Make it safe</div>\n    <h2>Make It Safe to Speak Up</h2>\n    <p><b>Psychological safety</b> is the shared sense that you can ask a question, admit a mistake, or float a half-formed idea without being embarrassed or punished. It goes hand in hand with high standards \u2014 it does not lower them. When a mentee feels safe, she reports problems early, asks the questions that keep her work sound, and starts taking intellectual risks.</p>\n    <p>The most useful single step is a clear, spoken <b>no-fault policy</b> for mistakes. When people fear blame, they hide problems \u2014 and a hidden problem in the lab quietly costs far more than the mistake itself. The first time she reports an error, thank her for it before you do anything else.</p>\n    <div class=\"saybox\"><div class=\"lbl\">Say it out loud, on day one</div>\n      <p>\"If something breaks or an experiment fails, tell me the moment you know \u2014 you will never be in trouble for reporting it. We'll figure out the cause together.\"</p>\n    </div>\n    <p>One more habit matters here: <b>correct in private.</b> A correction delivered in front of the group raises the social cost of every future question. Address the work, not the person, and keep it one-on-one.</p>", "<div class=\"eyebrow\">Build her identity</div>\n    <h2>Recognize Her, and Invite Her Thinking</h2>\n    <p>Seeing yourself as a researcher has three parts. After a couple of months, most mentees have the first two. The third is the one a mentor gives.</p>\n    <div class=\"agree\">\n      <div class=\"a\"><div class=\"ico\">&#128218;</div><div class=\"h\">Competence</div><div class=\"t\">She knows the material and the methods.</div></div>\n      <div class=\"a\"><div class=\"ico\">&#128300;</div><div class=\"h\">Performance</div><div class=\"t\">She can do the work in the lab.</div></div>\n      <div class=\"a hl\"><div class=\"ico\">&#127895;&#65039;</div><div class=\"h\">Recognition</div><div class=\"t\">She is seen \u2014 by herself and others \u2014 as a researcher. This is the part you confer.</div></div>\n    </div>\n    <p style=\"margin-top:14px\">The most powerful way to confer it is <b>intellectual inclusion</b>: invite her into the thinking, not just the doing. Before you give your own read of a result, ask <i>\"What do you think is happening?\"</i> That one question treats her as someone whose judgment matters \u2014 and bring her into the planning conversation, not only the results readout.</p>\n    <p>Picture a puzzling data point. You could say, \"That's just a pipetting error, ignore it\" \u2014 accurate, and over months it teaches her that interpretation is your job. Or you could ask, \"Interesting \u2014 what could produce a point that far off?\" Five extra minutes, and you get a mentee who, by the end, interprets her own data instead of waiting to be told.</p>", "<div class=\"eyebrow\">One challenge, met well</div>\n    <h2>The Mentee Who Goes Quiet</h2>\n    <div class=\"challenge\">\n      <b>The situation.</b> Your mentee is engaged and capable when you talk one-on-one, but in group meetings she has gone quiet \u2014 she answers if asked but never volunteers, and routes most questions through one person she trusts. She has the same access as everyone else: a seat at the table, the project, the group chat.\n    </div>\n    <p>Access is not the same as belonging. Having a seat is something you can grant; <i>participating</i> is something she experiences \u2014 and going quiet is usually a signal that she does not yet feel fully part of the group, not a sign that she lacks ability. The encouraging news is that you can shift this directly.</p>\n    <ol class=\"steps3\">\n      <li><b>Notice the pattern, not just the access.</b> Watch participation, not permissions \u2014 the drop in her contributions is the information.</li>\n      <li><b>Invite her in explicitly.</b> Build a direct opening into meetings: \"Before we decide \u2014 what's your read?\" so contributing doesn't depend on her working up the nerve.</li>\n      <li><b>Protect her contributions.</b> If a question of hers gets brushed aside, gently restore it: \"That's a fair question \u2014 most people outside this area wouldn't assume that.\"</li>\n      <li><b>Fix the structure.</b> If decisions are happening somewhere she isn't \u2014 a hallway chat, a lunch \u2014 bring them into a setting she's part of.</li>\n    </ol>\n    <div class=\"takeaway\">Belonging shows up in behavior. When participation drops, treat it as a cue to adjust how you include her \u2014 a small, kind change on your side usually brings a capable mentee fully into the room.</div>"], quiz:[
 {stem:"Your mentee reports breaking a piece of equipment. Which response best supports psychological safety?",
  opts:["Express clear disappointment so she is more careful next time.",
        "Thank her for reporting it promptly, then address the cause through training rather than blame.",
        "Ask her who else was involved.",
        "Mention it at the next group meeting as a cautionary example."],
  correct:1,
  fb:"Thanking her first keeps reporting safe; you address the cause through training. Blame teaches people to hide the next problem."},

        "Re-run the experiment yourself to be sure."],
  correct:1,
  fb:"Inviting her interpretation first treats her as someone whose judgment matters — that recognition is what builds a researcher."},
 {stem:"What is the difference between including a mentee and her feeling she belongs?",
  opts:["They are the same thing.",
        "Inclusion is the access you give (a seat, a project); belonging is whether she actually participates and feels part of the group, which shows in her behavior.",

 {stem:"A capable mentee is engaged one-on-one but has gone quiet in group meetings. What is the best response?",

{title:"Module 5 \u2014 Culturally Aware Mentoring", pages:["<div class=\"eyebrow\">Why it matters</div>\n    <h2>Mentoring Across Difference</h2>\n    <p>You and your mentee may come from different backgrounds \u2014 cultural, racial, ethnic, disciplinary, first-generation, and more. Those differences shape how each of you communicates, what you assume is \"obvious,\" and how trust builds between you. <b>Culturally aware mentoring</b> simply means being conscious of this, and adjusting so every mentee can do her best work and feel she belongs.</p>\n    <p>This is not about having all the answers, or walking on eggshells. It is a set of habits \u2014 curiosity, humility, and a willingness to ask and learn. It is also a recognized core mentoring competency, and an explicit priority of the CaNCURE program and its NIH training mission.</p>\n    <div class=\"objbox\"><b>By the end of this module you will be able to:</b>\n      <ul>\n        <li>Recognize how cultural background shapes the mentoring relationship.</li>\n        <li>Practice cultural humility \u2014 noticing your own assumptions.</li>\n        <li>Explain why \"treating everyone the same\" can leave barriers in place.</li>\n        <li>Respond well to an unintended cultural misstep.</li>\n      </ul>\n    </div>", "<div class=\"eyebrow\">Awareness</div>\n    <h2>Culture Shapes the Relationship</h2>\n    <p>Culture influences a lot of everyday lab behavior \u2014 none of it right or wrong, just different. How comfortable someone is asking a question or challenging an idea, how they read feedback, whether they speak up or wait to be invited, how they view hierarchy or time: all of this varies with background and experience.</p>\n    <div class=\"agree\">\n      <div class=\"a\"><div class=\"ico\">&#128172;</div><div class=\"h\">Speaking up</div><div class=\"t\">Some mentees challenge ideas freely; others were taught to wait to be invited.</div></div>\n      <div class=\"a\"><div class=\"ico\">&#128221;</div><div class=\"h\">Reading feedback</div><div class=\"t\">Direct critique lands as helpful to some, harsh to others.</div></div>\n      <div class=\"a\"><div class=\"ico\">&#9201;&#65039;</div><div class=\"h\">Hierarchy &amp; time</div><div class=\"t\">Norms about deadlines and addressing senior people differ widely.</div></div>\n    </div>\n    <p style=\"margin-top:14px\"><b>The key skill is cultural humility:</b> being aware that you carry your own culturally shaped assumptions \u2014 everyone does \u2014 and staying curious instead of assuming your mentee shares them. You do not need to be an expert in anyone's culture. You need to be humble, ask, and get to know your mentee as an individual: her goals, and how she likes to work and receive feedback.</p>", "<div class=\"eyebrow\">Fairness, rethought</div>\n    <h2>Equity vs. \"Treating Everyone the Same\"</h2>\n    <p>A common, well-meaning instinct is: \"I treat all my mentees exactly the same \u2014 that's fair.\" But identical treatment can quietly disadvantage someone. A first-generation student may not know the unwritten norms others picked up at home; an international student may need context others take for granted; a student from a group underrepresented in science may carry the extra weight of wondering whether she belongs.</p>\n    <div class=\"agree two\">\n      <div class=\"a\"><div class=\"ico\">&#9878;&#65039;</div><div class=\"h\">Same treatment for all</div><div class=\"t\">Feels fair, but assumes everyone starts from the same place \u2014 so it can leave some mentees without the support they need.</div></div>\n      <div class=\"a hl\"><div class=\"ico\">&#129309;</div><div class=\"h\">Equitable support</div><div class=\"t\">Match the support to each person's actual starting point \u2014 more explanation where needed, unwritten rules made explicit, belonging affirmed.</div></div>\n    </div>\n    <p style=\"margin-top:14px\">Equity is not lowering the bar \u2014 it is helping everyone reach it. And beware the well-intentioned \"I don't see identity at all\" stance: ignoring identity does not remove the barriers a mentee may face, it just leaves them unaddressed. It is good, not awkward, to recognize that her experience may differ from yours.</p>", "<div class=\"eyebrow\">One challenge, met well</div>\n    <h2>An Unintended Misstep</h2>\n    <div class=\"challenge\">\n      <b>The situation.</b> In a group setting you make an offhand assumption \u2014 maybe you assume your mentee celebrates a particular holiday, or you compliment her on her English, or a labmate frames her question as \"naive.\" You meant nothing unkind by it, but she goes quiet. It landed as a small reminder that she is seen as an outsider.\n    </div>\n    <p>This happens to every mentor at some point. What matters is not being flawless \u2014 it is how you respond. Impact counts for more than intent, and a good repair actually builds trust.</p>\n    <ol class=\"steps3\">\n      <li><b>Notice, and don't get defensive.</b> You can hold both truths: \"I didn't mean it that way, and I can see it didn't land well.\"</li>\n      <li><b>Acknowledge briefly and sincerely.</b> A short, genuine \"I'm sorry \u2014 that was a thoughtless assumption on my part\" does more than a long explanation.</li>\n      <li><b>Adjust and move on.</b> Change the behavior; don't over-apologize or make your mentee responsible for managing your feelings.</li>\n      <li><b>If it came from someone else,</b> gently redirect in the moment to restore her standing \u2014 \"That's a fair question, actually.\"</li>\n    </ol>\n    <div class=\"takeaway\">Culturally aware mentoring isn't about never making a mistake \u2014 it's about responding with humility when you do. That repair is often what deepens trust rather than breaking it.</div>"], quiz:[
 {stem:"What does \"cultural humility\" mean for a mentor?",
  opts:["Becoming an expert in your mentee's culture before you mentor her.",
        "Being aware of your own culturally shaped assumptions and staying curious about differences.",
        "Avoiding any mention of background or identity.",
        "Treating culture as irrelevant to the work."],
  correct:1,
  fb:"Cultural humility is awareness of your own assumptions plus curiosity — not expertise in someone else's culture."},
 {stem:"Why can \"treating every mentee exactly the same\" be a problem?",
  opts:["It isn't a problem; identical treatment is always the fairest approach.",
        "Students start from different places, so the same treatment can leave some without the support or unwritten knowledge they need.",
        "It takes too much of the mentor's time.",
        "It is against lab policy."],
  correct:1,
  fb:"Equity means matching support to each person's starting point — not giving everyone the identical thing regardless of need."},
 {stem:"A mentor says, \"I don't see identity at all — everyone's just a scientist to me.\" What is the limitation of this view?",
  opts:["It is the ideal approach and has no limitation.",
        "Ignoring identity doesn't remove the barriers a mentee may face — it just leaves them unaddressed.",
        "It means the mentor is biased against scientists.",
        "It only applies to senior researchers."],
  correct:1,
  fb:"A 'colorblind' stance overlooks real, identity-related barriers instead of helping the mentee with them."},
 {stem:"You realize an offhand comment you made left your mentee feeling singled out. What is the best response?",
  opts:["Explain at length that you didn't mean anything by it.",

        "Avoid her for a while so things cool down.",

  correct:1,
  fb:"Impact matters more than intent. A brief, sincere repair and a change in behavior build trust; defensiveness erodes it."}

{title:"Module 6 \u2014 Professional Development and a Strong Finish", pages:["<div class=\"eyebrow\">Why it matters</div>\n    <h2>Finishing Well</h2>\n    <p>The final weeks of a co-op are easy to let drift \u2014 but a strong finish is one of the most valuable things you can give your mentee, and it protects the work too. Finishing well has two parts: helping her <b>launch forward</b> (her growth, her next step, her network), and <b>closing the work cleanly</b> so anyone could pick it up after she leaves.</p>\n    <p>Think of this module as the payoff of the whole experience. A good ending turns six months of effort into a real launch point for her \u2014 and into a lasting record for your lab.</p>\n    <div class=\"objbox\"><b>By the end of this module you will be able to:</b>\n      <ul>\n        <li>Run a forward-looking exit conversation (growth, career, connections).</li>\n        <li>Support her next step with a development plan and a strong recommendation letter.</li>\n        <li>Ensure a clean documentation handover a successor can actually use.</li>\n        <li>Spend the final weeks on synthesis, not new experiments.</li>\n      </ul>\n    </div>", "<div class=\"eyebrow\">The exit conversation</div>\n    <h2>A Forward-Looking Exit Conversation</h2>\n    <p>Make time for an exit conversation \u2014 and treat it as a <b>launch briefing, not a performance review</b>. A grading frame invites defensiveness; a forward-looking one sends her off with momentum. It has three natural parts:</p>\n    <div class=\"agree\">\n      <div class=\"a\"><div class=\"ico\">&#128200;</div><div class=\"h\">Growth review</div><div class=\"t\">Tell her story back to her: \"In March you ran the protocol I handed you; by May you were proposing the controls.\"</div></div>\n      <div class=\"a\"><div class=\"ico\">&#129517;</div><div class=\"h\">Career discussion</div><div class=\"t\">Where is she headed \u2014 grad school, med school, industry \u2014 and what are the next concrete steps?</div></div>\n      <div class=\"a\"><div class=\"ico\">&#129309;</div><div class=\"h\">Connections</div><div class=\"t\">Who can you introduce her to? What doors can you open on her behalf?</div></div>\n    </div>\n    <p style=\"margin-top:14px\">Naming her growth arc out loud is a genuine gift \u2014 it gives her a story about herself as a researcher that she can carry into the next opportunity.</p>", "<div class=\"eyebrow\">Launch tools</div>\n    <h2>Tools for Her Next Step</h2>\n    <p><b>A simple development plan.</b> Walk through her strengths, interests, goals, and next steps \u2014 a lightweight version of an Individual Development Plan (IDP). It helps her see how far she has come and decide where to aim next. Point her toward where her biggest growth actually was (\"your strongest gains were in experimental design, not just technique\").</p>\n    <p><b>The recommendation letter</b> is the most durable thing you will produce for her. Two rules make it strong \u2014 and guard against a well-documented bias, where students from some groups are described in warm but vague terms while others get credited for capability:</p>\n    <div class=\"agree two\">\n      <div class=\"a dim\"><div class=\"ico\">&#128533;</div><div class=\"h\">Faint praise</div><div class=\"t\">\"Maria was hardworking and a pleasure to have in the lab.\" Warm, but vague \u2014 it says little about what she can do.</div></div>\n      <div class=\"a hl\"><div class=\"ico\">&#11088;</div><div class=\"h\">Specific &amp; capability-focused</div><div class=\"t\">\"Maria independently troubleshot a failing assay, proposed the fix that worked, and presented it at lab meeting.\"</div></div>\n    </div>\n    <p style=\"margin-top:14px\">Lead with what she <i>did</i> and the skills she showed. Specific, capability-focused detail predicts far better \u2014 and it makes sure every mentee's letter does her justice.</p>", "<div class=\"eyebrow\">One challenge, met well</div>\n    <h2>A Finish That Almost Lost the Work</h2>\n    <div class=\"challenge\">\n      <b>The situation.</b> It is the last two weeks. The data is spread across two notebooks and a shared folder named \"misc,\" the samples are labeled in shorthand only your mentee can decode, and no exit conversation has happened yet. The science was good \u2014 but six months of it is about to become unfindable the moment she leaves.\n    </div>\n    <p>This is avoidable, and the fixes are simple once you make them the priority for the final stretch:</p>\n    <ol class=\"steps3\">\n      <li><b>Stop starting new things.</b> The last weeks are for synthesis. A new experiment begun now will not finish cleanly and just becomes orphaned, half-documented data.</li>\n      <li><b>Build a single index.</b> One document listing every dataset and exactly where it lives.</li>\n      <li><b>Relabel for a successor.</b> The test: could someone who was never involved find and understand the work without her? Date + initials + project + condition, with a key in the notebook.</li>\n      <li><b>Have the exit conversation.</b> Don't let her leave without the growth, career, and network talk \u2014 and the letter.</li>\n    </ol>\n    <div class=\"takeaway\">A strong finish turns scattered results into a record anyone can build on, and turns six months of work into a launch point for your mentee. It is the most satisfying part of the whole arc.</div>"], quiz:[
 {stem:"The exit conversation at the end of a co-op is best approached as:",
  opts:["A performance review that grades how she did.",
        "A forward-looking launch conversation — growth, career, and connections.",
        "A formality you can skip if you are busy.",
        "A chance to list everything that went wrong."],
  correct:1,
  fb:"A forward-looking 'launch briefing' sends her off with momentum; a grading frame just invites defensiveness."},
 {stem:"What makes a recommendation letter strongest?",
  opts:["Warm, general praise like \"hardworking and a pleasure to have around.\"",
        "Specific, capability-focused detail — what she actually did and the skills she showed.",
        "Keeping it short and vague to save time.",
        "Focusing on her personality rather than her work."],
  correct:1,
  fb:"Specific accomplishments predict far better than warm generalities — and they guard against faint-praise bias."},
 {stem:"What is the best test of whether a documentation handover is complete?",
  opts:["The mentee can still find everything if she comes back later.",
        "Someone who was never involved can locate and understand the work without her present.",
        "The notebook has an entry for every experiment.",
        "The PI has signed off on a final report."],
  correct:1,
  fb:"The standard is successor-readability: a stranger to the project can pick it up cold."},

]}

<div class="thanks" id="svthanks"><h3>Thank you for your feedback!</h3><p>Your responses help us make this course better for the next mentor. Use <b>Finish</b> below to complete the course.</p></div>`;

var DONE=`<div style="text-align:center"><div style="font-size:46px">&#127881;</div>
<h2>Congratulations — course complete!</h2>
<p>You have finished the CaNCURE Research Mentoring course. You now have a practical toolkit for mentoring an undergraduate researcher — from a warm first week through a strong finish.</p>
<p class="muted">You may close this window. If your program records completion, follow any instructions provided alongside the course.</p></div>`;

function quizHTML(mi){
  var m=COURSE[mi], s=qstate[mi];
  var short=m.title.split('—')[0].trim();
  var h='<div class="eyebrow">Check your understanding</div><h2>'+short+' Quiz <span class="badge">PASS = 75%</span></h2>';
  h+='<p class="muted">Answer every question. You need 75% to continue — and you can retake this as many times as you like, so it cannot be failed.</p>';
  for(var i=0;i<m.quiz.length;i++){
    h+='<div class="q"><div class="qno">QUESTION '+(i+1)+'</div><p class="stem">'+m.quiz[i].stem+'</p>';
    var order=s.order[i];
    for(var p=0;p<order.length;p++){
      var checked=(s.sel[i]===p)?' checked':'';
      h+='<label class="opt" data-q="'+i+'" data-o="'+p+'"><input type="radio" name="qq'+mi+'_'+i+'" value="'+p+'"'+checked+'>'+m.quiz[i].opts[order[p]]+'</label>';
    }
    h+='<div class="fb" id="fb'+mi+'_'+i+'"></div></div>';
  }
  h+='<div style="text-align:center"><button class="primary" id="subBtn">Submit answers</button></div><div class="scorebox" id="sbox"></div>';
  return h;
}
function paintQuiz(mi){
  var m=COURSE[mi], s=qstate[mi];
  for(var i=0;i<m.quiz.length;i++){
    var cpos=s.order[i].indexOf(m.quiz[i].correct);
    document.querySelectorAll('.opt[data-q="'+i+'"]').forEach(function(l){l.classList.remove('correct','wrong');});
    var fb=document.getElementById('fb'+mi+'_'+i);
    if(s.sel[i]>=0){
      var chosen=document.querySelector('.opt[data-q="'+i+'"][data-o="'+s.sel[i]+'"]');
      if(s.sel[i]===cpos){chosen.classList.add('correct');fb.className='fb show ok';fb.textContent='Correct. '+m.quiz[i].fb;}
      else{chosen.classList.add('wrong');document.querySelector('.opt[data-q="'+i+'"][data-o="'+cpos+'"]').classList.add('correct');fb.className='fb show no';fb.textContent='Not quite. '+m.quiz[i].fb;}
    }
  }
  var pct=Math.round(s.score/m.quiz.length*100);
  var sb=document.getElementById('sbox');
  sb.style.display='block'; sb.className='scorebox '+(s.passed?'pass':'fail');
  sb.innerHTML=s.passed?('<h3>Passed — '+s.score+'/'+m.quiz.length+' ('+pct+'%)</h3><p>Use <b>Next</b> below to continue.</p>'):('<h3>'+s.score+'/'+m.quiz.length+' ('+pct+'%) — almost there</h3><p>Review the feedback above, adjust your answers, and submit again. There is no limit on attempts.</p>');
  if(steps[cur].kind==='quiz' && steps[cur].mi===mi) next.disabled=!s.passed;
}
function bindQuiz(mi){
  var m=COURSE[mi], s=qstate[mi];
  if(s.graded) paintQuiz(mi);
  document.getElementById('subBtn').onclick=function(){
    for(var i=0;i<m.quiz.length;i++){var r=document.querySelector('input[name="qq'+mi+'_'+i+'"]:checked'); s.sel[i]=r?(+r.value):-1;}
    for(var c=0;c<m.quiz.length;c++){ if(s.sel[c]<0){alert('Please answer every question.');return;} }
    var correct=0;
    for(var j=0;j<m.quiz.length;j++){ var cpos=s.order[j].indexOf(m.quiz[j].correct); if(s.sel[j]===cpos) correct++; }
    s.graded=true; s.score=correct; s.passed=(correct/m.quiz.length)>=PASS;
    paintQuiz(mi);
  };
}
function bindSurvey(){
  document.querySelectorAll('.likert').forEach(function(grp){ grp.addEventListener('change',function(){grp.querySelectorAll('label').forEach(function(l){l.classList.remove('sel');});var c=grp.querySelector('input:checked');if(c)c.closest('label').classList.add('sel');}); });
  var b=document.getElementById('svBtn');
  if(b)b.onclick=function(){var q1=document.querySelector('input[name="sv1"]:checked'),q2=document.querySelector('input[name="sv2"]:checked'); if(!q1||!q2){alert('Please answer both questions.');return;} document.getElementById('svform').style.display='none'; document.getElementById('svthanks').style.display='block';};
}
function bindVideos(){
  document.querySelectorAll('.ytfacade').forEach(function(f){
    f.onclick=function(){ var id=f.getAttribute('data-id'); f.innerHTML='<iframe class="ytframe" src="https://www.youtube.com/embed/'+id+'?autoplay=1&rel=0" title="Mentorship video" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>'; };
  });
}
function render(){
  var st=steps[cur], label='', inner='';
  if(st.kind==='welcome'){label='Welcome'; inner=WELCOME;}
  else if(st.kind==='content'){label=COURSE[st.mi].title; inner=COURSE[st.mi].pages[st.pi];}
  else if(st.kind==='quiz'){label=COURSE[st.mi].title; inner=quizHTML(st.mi);}
  else if(st.kind==='reading'){label='Further Reading'; inner=READING;}
  else if(st.kind==='survey'){label='Course Feedback'; inner=SURVEY;}
  else {label='Complete'; inner=DONE;}
  stage.innerHTML='<section class="card stage-card">'+inner+'</section>';
  bindVideos();
  meta.textContent=label;
  bar.style.width=(cur/(steps.length-1)*100)+'%';
  prev.disabled=(cur===0);
  var lock=(st.kind==='quiz' && !qstate[st.mi].passed);
  next.style.display=(st.kind==='done')?'none':'';
  next.disabled=lock;
  next.textContent=(st.kind==='survey')?'Finish →':(st.kind==='welcome'?'Begin →':'Next →');
  if(st.kind==='quiz') bindQuiz(st.mi);
  if(st.kind==='survey') bindSurvey();
  window.scrollTo({top:0,behavior:'smooth'});
}
prev.onclick=function(){ if(cur>0){cur--;render();} };
next.onclick=function(){ var st=steps[cur]; if(st.kind==='quiz' && !qstate[st.mi].passed) return; if(cur<steps.length-1){cur++;render();} };
render();
</script>
</body>
</html>
